service: task-manager

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: dev

  environment:
    DATABASE_URL: ${env:DATABASE_URL}
    JWT_SECRET: ${env:JWT_SECRET}

package:
  individually: true
  include:
    - src/**
    - prisma/schema.prisma

functions:
  api:
    handler: src/lambda.handler
    memorySize: 512
    timeout: 20
    events:
      - httpApi: "*"

plugins:
  - serverless-offline
